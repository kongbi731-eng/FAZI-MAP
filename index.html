<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAZI Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQzFjLx3hR8NP5X0yvjDCn8dLzP7j8A="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <style>
    .leaflet-container {
      overflow: hidden;
      touch-action: none;
    }

    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-pane > svg,
    .leaflet-pane > canvas,
    .leaflet-zoom-box,
    .leaflet-image-layer,
    .leaflet-layer {
      position: absolute;
      left: 0;
      top: 0;
    }

    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow {
      user-select: none;
      -webkit-user-drag: none;
    }

    .leaflet-tile {
      filter: inherit;
      width: 256px;
      height: 256px;
      max-width: none !important;
      max-height: none !important;
      visibility: hidden;
    }

    .leaflet-tile-loaded {
      visibility: inherit;
    }

    .leaflet-map-pane {
      z-index: 400;
    }

    .leaflet-tile-pane {
      z-index: 200;
    }

    .leaflet-overlay-pane {
      z-index: 400;
    }

    .leaflet-marker-pane {
      z-index: 600;
    }

    .leaflet-tooltip-pane {
      z-index: 650;
    }

    .leaflet-popup-pane {
      z-index: 700;
    }

    .leaflet-control {
      position: relative;
      z-index: 800;
      pointer-events: auto;
    }

    .leaflet-top,
    .leaflet-bottom {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
    }

    .leaflet-top {
      top: 0;
    }

    .leaflet-right {
      right: 0;
    }

    .leaflet-bottom {
      bottom: 0;
    }

    .leaflet-left {
      left: 0;
    }

    .leaflet-control-container .leaflet-top,
    .leaflet-control-container .leaflet-bottom {
      transform: translate3d(0, 0, 0);
    }

    .leaflet-control-zoom a {
      display: block;
      width: 30px;
      height: 30px;
      line-height: 30px;
      text-align: center;
      text-decoration: none;
    }

    .leaflet-popup {
      position: absolute;
      text-align: center;
      margin-bottom: 20px;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(15, 15, 15, 0.94);
      color: #f5f5f5;
      border: 1px solid rgba(255, 38, 38, 0.44);
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.52), 0 0 28px rgba(255, 0, 0, 0.22);
      backdrop-filter: blur(14px);
    }

    .leaflet-popup-content {
      margin: 14px 16px;
      min-width: 220px;
    }

    .leaflet-popup-close-button {
      color: rgba(245, 245, 245, 0.72) !important;
    }

    .fazi-marker {
      position: relative;
      display: block;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: #dc2626;
      box-shadow:
        0 0 0 8px rgba(220, 38, 38, 0.15),
        0 0 24px rgba(239, 68, 68, 0.9),
        0 0 48px rgba(185, 28, 28, 0.42);
    }

    .fazi-marker::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      transform: translate(-50%, -50%);
    }

    .panel-scroll {
      scrollbar-color: rgba(248, 113, 113, 0.52) rgba(255, 255, 255, 0.08);
      scrollbar-width: thin;
    }

    .theme-bulb svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    body.light-mode {
      background: #f4f1ec;
      color: #171717;
    }

    body.light-mode main {
      background: #f4f1ec !important;
    }

    body.light-mode .leaflet-container {
      background: #f4f1ec;
    }

    body.light-mode section,
    body.light-mode aside {
      background: rgba(255, 255, 255, 0.78) !important;
      border-color: rgba(220, 38, 38, 0.28) !important;
      box-shadow: 0 24px 70px rgba(23, 23, 23, 0.12) !important;
    }

    body.light-mode .text-neutral-50,
    body.light-mode .text-neutral-100 {
      color: #171717 !important;
    }

    body.light-mode .text-neutral-200,
    body.light-mode .text-neutral-300 {
      color: #404040 !important;
    }

    body.light-mode .text-neutral-400,
    body.light-mode .text-neutral-500,
    body.light-mode .text-neutral-600 {
      color: #737373 !important;
    }

    body.light-mode .bg-black\/55 {
      background: rgba(255, 255, 255, 0.78) !important;
    }

    body.light-mode .bg-white\/\[0\.04\] {
      background: rgba(255, 255, 255, 0.86) !important;
    }

    body.light-mode .border-white\/10 {
      border-color: rgba(163, 163, 163, 0.58) !important;
    }

    body.light-mode .leaflet-control-zoom a,
    body.light-mode .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.86) !important;
      color: rgba(23, 23, 23, 0.76) !important;
    }

    body.light-mode .leaflet-popup-content-wrapper,
    body.light-mode .leaflet-popup-tip {
      background: rgba(255, 255, 255, 0.96);
      color: #171717;
    }
  </style>
</head>
<body>
  <main class="relative h-screen w-screen bg-[#0a0a0a]">
    <div id="map" aria-label="FAZI concert footprint map"></div>

    <section class="absolute left-4 top-4 z-[1000] max-w-[calc(100vw-2rem)] border border-red-500/25 bg-black/45 px-5 py-4 shadow-2xl shadow-black/50 backdrop-blur-xl sm:left-6 sm:top-6">
      <h1 class="text-xl font-semibold tracking-[0.18em] text-neutral-50 sm:text-2xl">FAZI MAP</h1>
      <p class="mt-1 text-sm tracking-[0.28em] text-red-400/90">演出足迹合集</p>
    </section>

    <button id="themeToggle" class="theme-bulb absolute left-4 top-36 z-[1000] flex h-11 w-11 items-center justify-center border border-red-500/25 bg-black/45 text-red-100 shadow-2xl shadow-black/40 backdrop-blur-xl transition hover:border-red-300/70 hover:bg-red-500/15 sm:left-6" type="button" aria-label="切换开灯关灯模式" title="切换开灯/关灯">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 18h6" />
        <path d="M10 22h4" />
        <path d="M8.5 14.5c-1.2-1-2-2.6-2-4.4a5.5 5.5 0 0 1 11 0c0 1.8-.8 3.4-2 4.4-.8.7-1.1 1.3-1.2 2H9.7c-.1-.7-.4-1.3-1.2-2Z" />
      </svg>
    </button>

    <aside class="absolute bottom-4 left-4 right-4 z-[1000] max-h-[52vh] overflow-hidden border border-red-500/20 bg-black/55 shadow-2xl shadow-black/60 backdrop-blur-xl md:bottom-auto md:left-auto md:right-6 md:top-6 md:w-[390px] md:max-h-[calc(100vh-3rem)]">
      <div class="panel-scroll max-h-[52vh] overflow-y-auto p-4 md:max-h-[calc(100vh-3rem)] md:p-5">
        <div class="mb-4 flex items-center justify-between gap-4 border-b border-white/10 pb-3">
          <div>
            <h2 class="text-sm font-semibold uppercase tracking-[0.2em] text-neutral-100">演出日程 Archive</h2>
            <p id="tourCount" class="mt-1 text-xs tracking-[0.15em] text-neutral-400">Loading tour data...</p>
          </div>
          <button id="fitRoute" class="border border-red-400/40 px-3 py-2 text-xs font-medium uppercase tracking-[0.16em] text-red-100 transition hover:border-red-300/80 hover:bg-red-500/10" type="button">
            View All
          </button>
        </div>

        <ol id="showList" class="space-y-2"></ol>
        <p id="formStatus" class="mt-2 min-h-5 text-xs text-neutral-400 hidden" role="status" aria-live="polite"></p>
      </div>
    </aside>
  </main>

  <script>
    const map = L.map("map", {
      minZoom: 2,
      zoomControl: false,
      worldCopyJump: true
    }).setView([38.5, 75], 3);

    L.control.zoom({
      position: "bottomright"
    }).addTo(map);

    const tileLayers = {
      dark: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      light: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png"
    };

    const tileLayer = L.tileLayer(tileLayers.dark, { // 默认设置为 dark 主题
      minZoom: 2,
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    const markerIcon = L.divIcon({
      className: "",
      html: '<span class="fazi-marker block"></span>',
      iconSize: [24, 24],
      iconAnchor: [12, 24],
      popupAnchor: [0, -24]
    });

    const elements = {
      list: document.querySelector("#showList"),
      fitRoute: document.querySelector("#fitRoute"),
      themeToggle: document.querySelector("#themeToggle"),
      tourCount: document.querySelector("#tourCount"),
      status: document.querySelector("#formStatus")
    };

    let sampleShows = [];
    let markerLayer = L.layerGroup().addTo(map);

    const escapeHtml = (value) => {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    };

    const normalizeUrl = (value) => {
      const trimmed = value.trim();
      if (!trimmed) return "";
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return `https://${trimmed}`;
    };

    const getShowLinks = (show) => {
      return Array.isArray(show.links) ? show.links.filter(Boolean) : [];
    };

    const renderLinks = (links) => {
      if (!links.length) {
        return '<p class="text-xs leading-5 text-neutral-500">暂无摄影链接。</p>';
      }

      return `
        <ul class="space-y-1.5">
          ${links.map((link, index) => `
            <li>
              <a class="block break-all text-xs leading-5 text-red-200 underline decoration-red-400/40 underline-offset-4 transition hover:text-red-100" href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">
                Link ${index + 1}
              </a>
            </li>
          `).join("")}
        </ul>
      `;
    };

    const popupTemplate = (show) => `
      <div class="space-y-3">
        <div class="flex items-center justify-between gap-3">
          <p class="text-xs uppercase tracking-[0.24em] text-red-300/80">${escapeHtml(show.date)}</p>
          <span class="text-[10px] uppercase tracking-[0.18em] text-neutral-500">Archive</span>
        </div>
        <div>
          <h2 class="text-lg font-semibold tracking-wide text-neutral-50">${escapeHtml(show.name)}</h2>
          ${show.city ? `<p class="mt-1 text-sm text-neutral-300">${escapeHtml(show.city)}</p>` : ""}
          <p class="mt-2 text-[11px] leading-5 text-neutral-500">${escapeHtml(show.latitude.toFixed(5))}, ${escapeHtml(show.longitude.toFixed(5))}</p>
        </div>
        <div class="border-t border-white/10 pt-3">
          <p class="mb-2 text-[10px] uppercase tracking-[0.18em] text-red-300/75">Photo Links</p>
          ${renderLinks(getShowLinks(show))}
          <form class="mt-3 flex gap-2" data-link-form="${escapeHtml(show.id)}">
            <input class="min-w-0 flex-1 border border-white/10 bg-white/[0.07] px-2 py-1.5 text-xs text-neutral-50 outline-none placeholder:text-neutral-600 focus:border-red-300/60" type="url" placeholder="粘贴链接 (本地有效)" data-link-input required />
            <button class="shrink-0 border border-red-400/40 bg-red-500/15 px-2.5 py-1.5 text-[10px] font-semibold uppercase tracking-[0.14em] text-red-50 hover:bg-red-500/25" type="submit">Add</button>
          </form>
        </div>
      </div>
    `;

    const fitAllShows = () => {
      const points = sampleShows.map((show) => [show.latitude, show.longitude]);

      if (!points.length) {
        map.setView([38.5, 75], 3);
        return;
      }

      map.fitBounds(L.latLngBounds(points), {
        paddingTopLeft: [40, 40],
        paddingBottomRight: [40, 40],
        maxZoom: 6
      });
    };

    const renderShowList = () => {
      elements.list.innerHTML = "";
      elements.tourCount.textContent = `共收录 ${sampleShows.length} 场演出足迹`;

      sampleShows.forEach((show) => {
        const item = document.createElement("li");
        item.className = "group border border-white/10 bg-white/[0.04] px-3 py-2.5 transition hover:bg-white/[0.08]";

        item.innerHTML = `
          <button class="w-full text-left" type="button" data-fly-to="${escapeHtml(show.id)}">
            <span class="block break-words text-sm font-medium leading-5 text-neutral-100">${escapeHtml(show.name)}</span>
            <div class="mt-1 flex items-center justify-between text-xs text-neutral-500">
              <span>${escapeHtml(show.date)}</span>
              <span class="text-red-300/60">${getShowLinks(show).length} Links</span>
            </div>
          </button>
        `;
        elements.list.appendChild(item);
      });
    };

    const renderMap = () => {
      markerLayer.clearLayers();

      sampleShows.forEach((show) => {
        L.marker([show.latitude, show.longitude], { icon: markerIcon })
          .addTo(markerLayer)
          .bindPopup(popupTemplate(show), {
            className: "fazi-popup",
            closeButton: true,
            maxWidth: 320
          });
      });

      renderShowList();
    };

    const applyTheme = (theme) => {
      const nextTheme = theme === "light" ? "light" : "dark";
      document.body.classList.toggle("light-mode", nextTheme === "light");
      tileLayer.setUrl(tileLayers[nextTheme]);
      localStorage.setItem("fazi-map-theme", nextTheme);
      elements.themeToggle.setAttribute("aria-pressed", String(nextTheme === "light"));
    };

    elements.fitRoute.addEventListener("click", fitAllShows);

    elements.themeToggle.addEventListener("click", () => {
      const isLight = document.body.classList.contains("light-mode");
      applyTheme(isLight ? "dark" : "light");
    });

    document.addEventListener("submit", (event) => {
      const form = event.target.closest("[data-link-form]");
      if (!form) return;
      event.preventDefault();

      const id = form.dataset.linkForm;
      const input = form.querySelector("[data-link-input]");
      const link = normalizeUrl(input.value);

      if (!link) return;

      const show = sampleShows.find((entry) => entry.id === id);
      if (show) {
        if (!Array.isArray(show.links)) show.links = [];
        if (!show.links.includes(link)) {
          show.links.push(link);
        }
      }

      input.value = "";
      renderMap();

      const refreshed = sampleShows.find((entry) => entry.id === id);
      if (refreshed) {
        L.popup({
          className: "fazi-popup",
          closeButton: true,
          maxWidth: 320
        })
          .setLatLng([refreshed.latitude, refreshed.longitude])
          .setContent(popupTemplate(refreshed))
          .openOn(map);
      }
    });

    elements.list.addEventListener("click", (event) => {
      const flyButton = event.target.closest("[data-fly-to]");
      if (flyButton) {
        const id = flyButton.dataset.flyTo;
        const show = sampleShows.find((entry) => entry.id === id);
        if (show) {
          map.flyTo([show.latitude, show.longitude], 8, { duration: 0.9 });
        }
      }
    });

    async function loadShows() {
      try {
        // 读取并解析公共的统一数据源 show.json 
        const response = await fetch("show.json?v=" + new Date().getTime());
        if (!response.ok) {
          throw new Error(`Unable to load show.json: ${response.status}`);
        }
        const shows = await response.json();
        
        sampleShows = shows.map((show, index) => ({
          ...show,
          id: show.id || `show-${index}-${new Date(show.date).getTime()}`,
          links: show.links || []
        })).sort((a, b) => new Date(b.date) - new Date(a.date));

        renderMap();
        fitAllShows();
        setTimeout(() => {
          map.invalidateSize();
          fitAllShows();
        }, 120);
      } catch (error) {
        elements.tourCount.textContent = "数据加载失败，请检查 show.json";
        console.error(error);
      }
    }

    // 默认优先读取 localStorage 的主题状态，缺省为黑夜暗色主题 (dark)
    applyTheme(localStorage.getItem("fazi-map-theme") || "dark");
    loadShows();
  </script>
</body>
</html>
